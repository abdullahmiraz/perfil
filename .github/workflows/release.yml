name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run verify

      - name: Package extension zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p releases
          cd .output/chrome-mv3 && zip -r "../../releases/perfil-${VERSION}.zip" .

      - uses: softprops/action-gh-release@v2
        with:
          files: releases/perfil-*.zip
          generate_release_notes: true
