<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Perfil test form</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-size: 0.875rem;
        color: #444;
      }
      input {
        width: 100%;
        margin-top: 0.25rem;
        padding: 0.5rem;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Perfil test form</h1>
    <p>Use this page to test Scan / Fill from the extension.</p>
    <!-- same fields as test/fixtures/contact-form.html -->
    <form id="contact">
      <label for="firstName">First name</label>
      <input id="firstName" name="firstName" autocomplete="given-name" />

      <label for="lastName">Last name</label>
      <input id="lastName" name="lastName" autocomplete="family-name" />

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" autocomplete="email" />

      <label for="phone">Phone number</label>
      <input id="phone" name="phone" type="tel" autocomplete="tel" />

      <label for="company">Company</label>
      <input id="company" name="company" autocomplete="organization" />

      <label for="city">City</label>
      <input id="city" name="city" autocomplete="address-level2" />

      <label for="country">Country</label>
      <input id="country" name="country" autocomplete="country" />
    </form>
  </body>
</html>
